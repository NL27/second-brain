# Second Brain - default configuration.
# Copy to ./config.yaml in your project root to override. Environment
# variables and CLI flags take precedence over this file.

# Where to store versioned run logs and the SQLite index.
paths:
  logs_dir: logs
  db_path: brain.db
  rules_dir: rules

# Model registry. Each entry is referenced by its key (e.g. "local-vision").
# `model` uses liteLLM provider syntax:
#   ollama/<name>            -> local via Ollama
#   openai/<name>            -> OpenAI cloud
#   anthropic/<name>         -> Anthropic cloud
#   groq/<name>, deepseek/<name>, gemini/<name>, dashscope/<name> ...
models:
  local-vision:
    model: ollama/ui-tars:7b
    location: local
    vision: true
    notes: "Local GUI-grounding model for host control."
  local-general:
    model: ollama/qwen2.5:7b
    location: local
    vision: false
    notes: "Local general reasoning model."
  local-small:
    model: ollama/llama3.2:3b
    location: local
    vision: false
    notes: "Tiny local model (~2GB) for low-RAM machines. No key needed."
  cloud-claude:
    model: anthropic/claude-sonnet-4-5
    location: cloud
    vision: true
    notes: "Cloud frontier model; strong computer-use (paid)."
  cloud-gpt:
    model: openai/gpt-4.1
    location: cloud
    vision: true
    notes: "Cloud alternative for eval comparisons (paid)."
  # --- FREE-tier friendly cloud models (no card needed) ---
  cloud-gemini:
    model: gemini/gemini-2.0-flash
    location: cloud
    vision: true
    notes: "Free tier (GEMINI_API_KEY). May hit daily/RPM limits — try cloud-gemini-lite."
  cloud-gemini-lite:
    model: gemini/gemini-2.5-flash-lite
    location: cloud
    vision: true
    notes: "Lighter Gemini; often separate free-tier quota from 2.0-flash."
  cloud-groq:
    model: groq/llama-3.3-70b-versatile
    location: cloud
    vision: false
    notes: "Free, very fast (GROQ_API_KEY). Text-only; drives via AX tree."
  cloud-openrouter:
    model: openrouter/meta-llama/llama-3.3-70b-instruct:free
    location: cloud
    vision: false
    notes: "Free via OpenRouter (OPENROUTER_API_KEY). Swap model for any :free one."
  cloud-github:
    model: github/gpt-4o-mini
    location: cloud
    vision: true
    notes: "Free GitHub Models (GITHUB_API_KEY = a GitHub token). You have an account."

# Default model for CLI commands. Use local-small only on low-RAM machines (8GB).
default_model: local-general

# How the agent acts on the computer.
control:
  # backend: driver | cua | none
  backend: driver
  # Smart mode: stronger model + planning + auto snapshot after launch (slower, fewer loops).
  # Set smart_mode: false and default_model: local-small for fastest/cheapest on 8GB RAM.
  smart_mode: true
  driver_model: local-general
  plan_before_act: true
  auto_snapshot_after_launch: true
  driver_temperature: 0.15
  max_steps: 40
  step_timeout: 90

# Safety. See rules/ for the per-task rule files this references.
safety:
  # Require explicit confirmation for any action tagged destructive.
  require_approval_for_destructive: true
  # Global kill: never execute, only plan + log.
  dry_run: false
  # Default rules file applied to every task.
  default_rules: default
